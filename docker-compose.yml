version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sribrown_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sribrown_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KBANK_CLIENT_ID=${KBANK_CLIENT_ID}
      - KBANK_CLIENT_SECRET=${KBANK_CLIENT_SECRET}
      - KBANK_MERCHANT_ID=${KBANK_MERCHANT_ID}
      - KBANK_PARTNER_ID=${KBANK_PARTNER_ID}
      - KBANK_PARTNER_SECRET=${KBANK_PARTNER_SECRET}
      - OMISE_PUBLIC_KEY=${OMISE_PUBLIC_KEY}
      - OMISE_SECRET_KEY=${OMISE_SECRET_KEY}
    volumes:
      - ./backend:/app
      - /app/env
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sribrown_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "${PMA_PORT}:80"
    depends_on:
      - db

volumes:
  db_data:
